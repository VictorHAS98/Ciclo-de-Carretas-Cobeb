name: Build & Publish APK

on:
  push:
    tags:
      - 'v*'          # dispara em: git tag v1.0.0 && git push --tags

permissions:
  contents: write     # necessário para criar GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (Android)
        run: npm run build
        env:
          VITE_BUILD_TARGET: android
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_ORS_API_KEY: ${{ secrets.VITE_ORS_API_KEY }}

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          node -e "require('fs').writeFileSync('android/cobeb-release.jks', Buffer.from(process.env.KEYSTORE_BASE64, 'base64'))"

      - name: Build signed APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ../cobeb-release.jks
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             cobeb-ciclo-${{ github.ref_name }}.apk

      - name: Create GitHub Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "COBEB Ciclo ${{ github.ref_name }}"
          body: |
            ## COBEB Ciclo de Carretas ${{ github.ref_name }}

            Instale o APK no celular do motorista para rastreamento em background.

            **Como instalar:**
            1. Baixe o arquivo `cobeb-ciclo-${{ github.ref_name }}.apk`
            2. Permita "Instalar de fontes desconhecidas" se solicitado
            3. Instale e faça login normalmente
          files: cobeb-ciclo-${{ github.ref_name }}.apk
